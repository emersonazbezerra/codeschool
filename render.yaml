services:
  - type: web
    name: codeschool-api
    env: docker
    dockerfilePath: ./CodeSchool.API/Dockerfile
    dockerContext: ./CodeSchool.API
    envVars:
      - key: ASPNETCORE_URLS
        value: http://+:$PORT
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: JWT_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        fromService:
          type: web
          name: codeschool-frontend
          property: host

  - type: web
    name: codeschool-frontend
    env: static
    rootDir: CodeSchool.Frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: codeschool-api
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
