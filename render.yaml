services:
  - type: web
    name: codeschool-api
    runtime: dotnet
    rootDir: CodeSchool.API
    buildCommand: dotnet publish CodeSchool.API.csproj -c Release -o out
    startCommand: dotnet out/CodeSchool.API.dll
    envVars:
      - key: ASPNETCORE_URLS
        value: http://+:$PORT
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: JWT_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        fromService:
          type: web
          name: codeschool-frontend
          property: hostURL

  - type: web
    name: codeschool-frontend
    runtime: static
    rootDir: CodeSchool.Frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: codeschool-api
          property: hostURL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
